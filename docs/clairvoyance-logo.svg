<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c001e"/>
      <stop offset="100%" stop-color="#010006"/>
    </radialGradient>

    <!-- Cyan glow filter -->
    <filter id="glow-c" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Purple glow filter -->
    <filter id="glow-p" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Intense glow for logo text -->
    <filter id="glow-text" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="3" result="blur2"/>
      <feMerge><feMergeNode in="blur1"/><feMergeNode in="blur2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Eye iris gradient -->
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc00ff"/>
      <stop offset="40%" stop-color="#4d00cc"/>
      <stop offset="70%" stop-color="#1a0044"/>
      <stop offset="100%" stop-color="#000011"/>
    </radialGradient>

    <!-- Scan line pattern -->
    <pattern id="scan" x="0" y="0" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="rgba(0,240,255,0.04)"/>
    </pattern>

    <!-- Circuit grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(102,0,204,0.12)" stroke-width="0.5"/>
    </pattern>

    <!-- Glitch clip -->
    <clipPath id="clip-glitch1"><rect x="0" y="155" width="800" height="8"/></clipPath>
    <clipPath id="clip-glitch2"><rect x="0" y="178" width="800" height="4"/></clipPath>

    <!-- Main text gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cc00ff"/>
      <stop offset="35%" stop-color="#6690ff"/>
      <stop offset="65%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#cc00ff"/>
    </linearGradient>

    <!-- Sub text gradient -->
    <linearGradient id="sub-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#cc00ff"/>
    </linearGradient>

    <!-- Hex gradient -->
    <linearGradient id="hex-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cc00ff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00f0ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff0080" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <rect width="800" height="400" fill="url(#scan)"/>

  <!-- Ambient radial glow -->
  <ellipse cx="400" cy="200" rx="380" ry="160" fill="rgba(102,0,204,0.06)"/>
  <ellipse cx="400" cy="200" rx="200" ry="100" fill="rgba(0,240,255,0.04)"/>

  <!-- ── CORNER BRACKETS ── -->
  <!-- Top-left -->
  <path d="M20,20 L20,60 M20,20 L60,20" stroke="#cc00ff" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Top-right -->
  <path d="M780,20 L780,60 M780,20 L740,20" stroke="#cc00ff" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Bottom-left -->
  <path d="M20,380 L20,340 M20,380 L60,380" stroke="#00f0ff" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Bottom-right -->
  <path d="M780,380 L780,340 M780,380 L740,380" stroke="#00f0ff" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Corner dots -->
  <circle cx="20" cy="20" r="2.5" fill="#cc00ff" opacity="0.9"/>
  <circle cx="780" cy="20" r="2.5" fill="#cc00ff" opacity="0.9"/>
  <circle cx="20" cy="380" r="2.5" fill="#00f0ff" opacity="0.9"/>
  <circle cx="780" cy="380" r="2.5" fill="#00f0ff" opacity="0.9"/>

  <!-- ── HORIZONTAL SCAN LINES ── -->
  <line x1="0" y1="90" x2="800" y2="90" stroke="rgba(102,0,204,0.2)" stroke-width="0.5"/>
  <line x1="0" y1="310" x2="800" y2="310" stroke="rgba(0,240,255,0.2)" stroke-width="0.5"/>

  <!-- ── EYE SYMBOL (left side) ── -->
  <g transform="translate(110,200)" filter="url(#glow-p)">
    <!-- Outer eye outline -->
    <ellipse cx="0" cy="0" rx="62" ry="38" fill="none" stroke="url(#hex-grad)" stroke-width="1.5" opacity="0.9"/>
    <!-- Iris -->
    <circle cx="0" cy="0" r="26" fill="url(#iris)"/>
    <!-- Iris ring -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="#cc00ff" stroke-width="1" opacity="0.8"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="rgba(0,240,255,0.4)" stroke-width="0.5"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="11" fill="#000"/>
    <circle cx="0" cy="0" r="11" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.9"/>
    <!-- Inner pupil glow -->
    <circle cx="0" cy="0" r="6" fill="rgba(204,0,255,0.6)"/>
    <circle cx="0" cy="0" r="3" fill="#fff" opacity="0.9"/>
    <!-- Specular -->
    <circle cx="-5" cy="-5" r="2" fill="rgba(255,255,255,0.5)"/>
    <!-- Eye corner lines -->
    <line x1="-62" y1="0" x2="-80" y2="0" stroke="#cc00ff" stroke-width="1" opacity="0.6"/>
    <line x1="62" y1="0" x2="80" y2="0" stroke="#00f0ff" stroke-width="1" opacity="0.6"/>
    <!-- Vertical tick marks on iris -->
    <line x1="0" y1="-26" x2="0" y2="-20" stroke="#00f0ff" stroke-width="1" opacity="0.7"/>
    <line x1="0" y1="20" x2="0" y2="26" stroke="#00f0ff" stroke-width="1" opacity="0.7"/>
    <!-- Eyelid shine -->
    <path d="M-40,-12 Q0,-28 40,-12" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none"/>
  </g>

  <!-- EYE side data lines -->
  <line x1="36" y1="175" x2="80" y2="175" stroke="rgba(0,240,255,0.3)" stroke-width="0.5"/>
  <line x1="36" y1="225" x2="80" y2="225" stroke="rgba(204,0,255,0.3)" stroke-width="0.5"/>

  <!-- ── HEXAGON ACCENT (right side) ── -->
  <g transform="translate(690,200)" filter="url(#glow-p)">
    <polygon points="0,-44 38,-22 38,22 0,44 -38,22 -38,-22"
             fill="none" stroke="url(#hex-grad)" stroke-width="1.5" opacity="0.85"/>
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"
             fill="none" stroke="rgba(0,240,255,0.35)" stroke-width="1"/>
    <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8"
             fill="rgba(102,0,204,0.3)" stroke="#cc00ff" stroke-width="1.5"/>
    <!-- Center diamond -->
    <polygon points="0,-7 7,0 0,7 -7,0" fill="#00f0ff" opacity="0.9"/>
    <!-- Hex corner accents -->
    <circle cx="0" cy="-44" r="2" fill="#cc00ff" opacity="0.8"/>
    <circle cx="38" cy="-22" r="2" fill="#6690ff" opacity="0.8"/>
    <circle cx="38" cy="22" r="2" fill="#00f0ff" opacity="0.8"/>
    <circle cx="0" cy="44" r="2" fill="#00f0ff" opacity="0.8"/>
    <circle cx="-38" cy="22" r="2" fill="#6690ff" opacity="0.8"/>
    <circle cx="-38" cy="-22" r="2" fill="#cc00ff" opacity="0.8"/>
  </g>

  <!-- Hex side lines -->
  <line x1="724" y1="175" x2="760" y2="175" stroke="rgba(204,0,255,0.3)" stroke-width="0.5"/>
  <line x1="724" y1="225" x2="760" y2="225" stroke="rgba(0,240,255,0.3)" stroke-width="0.5"/>

  <!-- ── MAIN LOGO TEXT ── -->
  <g filter="url(#glow-text)">
    <!-- Shadow / glitch offset layer 1 -->
    <text x="402" y="196" text-anchor="middle"
          font-family="'Courier New',monospace" font-weight="900" font-size="64"
          letter-spacing="12" fill="#ff0080" opacity="0.25"
          clip-path="url(#clip-glitch1)">CLAIRVOYANCE</text>
    <!-- Shadow / glitch offset layer 2 -->
    <text x="398" y="196" text-anchor="middle"
          font-family="'Courier New',monospace" font-weight="900" font-size="64"
          letter-spacing="12" fill="#00f0ff" opacity="0.2"
          clip-path="url(#clip-glitch2)">CLAIRVOYANCE</text>
    <!-- Main text -->
    <text x="400" y="196" text-anchor="middle"
          font-family="'Courier New',monospace" font-weight="900" font-size="64"
          letter-spacing="12" fill="url(#text-grad)">CLAIRVOYANCE</text>
  </g>

  <!-- ── SUBTITLE ── -->
  <text x="400" y="228" text-anchor="middle"
        font-family="'Courier New',monospace" font-size="11"
        letter-spacing="8" fill="url(#sub-grad)" opacity="0.85"
        filter="url(#glow-c)">PREDICTIVE SPORTS INTELLIGENCE ENGINE</text>


  <!-- ── DIVIDER LINES around title ── -->
  <!-- Left of title -->
  <line x1="195" y1="167" x2="210" y2="167" stroke="#cc00ff" stroke-width="1.5" opacity="0.8"/>
  <line x1="210" y1="167" x2="215" y2="162" stroke="#cc00ff" stroke-width="1" opacity="0.6"/>
  <!-- Right of title -->
  <line x1="605" y1="167" x2="590" y2="167" stroke="#00f0ff" stroke-width="1.5" opacity="0.8"/>
  <line x1="590" y1="167" x2="585" y2="162" stroke="#00f0ff" stroke-width="1" opacity="0.6"/>

  <!-- Underline with gaps -->
  <line x1="215" y1="207" x2="360" y2="207" stroke="rgba(204,0,255,0.5)" stroke-width="1"/>
  <line x1="375" y1="207" x2="425" y2="207" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="440" y1="207" x2="585" y2="207" stroke="rgba(0,240,255,0.5)" stroke-width="1"/>

  <!-- Bottom center rule -->
  <line x1="200" y1="258" x2="600" y2="258" stroke="rgba(102,0,204,0.2)" stroke-width="0.5"/>

  <!-- ── BOTTOM TAG ── -->
  <text x="400" y="278" text-anchor="middle"
        font-family="'Courier New',monospace" font-size="9"
        letter-spacing="5" fill="rgba(102,144,255,0.5)">SEE WHAT OTHERS CANNOT</text>

  <!-- ── ANIMATED DOTS (static version — look like data pulses) ── -->
  <circle cx="195" cy="200" r="2" fill="#cc00ff" opacity="0.7"/>
  <circle cx="200" cy="200" r="1.2" fill="rgba(204,0,255,0.3)"/>
  <circle cx="605" cy="200" r="2" fill="#00f0ff" opacity="0.7"/>
  <circle cx="600" cy="200" r="1.2" fill="rgba(0,240,255,0.3)"/>

  <!-- ── SCANLINE OVERLAY ── -->
  <rect width="800" height="400" fill="url(#scan)" opacity="0.4"/>

  <!-- ── VIGNETTE ── -->
  <radialGradient id="vig" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(1,0,6,0.65)"/>
  </radialGradient>
  <rect width="800" height="400" fill="url(#vig)"/>
</svg>
